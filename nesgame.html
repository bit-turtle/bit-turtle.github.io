<html><head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Nes Game</title>

	<script src="jsnes.min.js"></script>
	<script src="nes-embed.js"></script>
	<script>window.onload = function () { nes_load_url("nes-canvas", "nesgame.nes"); }</script>
</head>
<body>
	<style>
		body {
			margin: 0;
			padding: 0;
			background-color: black;
		}

		.nes-div {
			width: 768px;
			max-width: 768px;
			height: 720px;
			max-height: 720px;
			position: absolute;
			left: 0;
			right: 0;
			top: 0;
			bottom: 0;
			margin: auto;
		}

		canvas {
			image-rendering: optimizeSpeed;
			image-rendering: -moz-crisp-edges;
			image-rendering: -webkit-optimize-contrast;
			image-rendering: -o-crisp-edges;
			image-rendering: crisp-edges;
			-ms-interpolation-mode: nearest-neighbor;
			image-rendering: pixelated;
			width: 100%;
			height: 100%;
		}
		p {
			color: white;
			font-family: monospace;
		}
		a {
			color: lightblue;
		}
	</style>
	<div class="nes-div">
		<canvas id="nes-canvas" width="256" height="240"></canvas>
		<p>
			Controls: Arrow Keys to Move, X/Z for A/B, and Enter/Shift for Start/Select <br><br>
			Github Repository: <a href="https://github.com/bit-turtle/nesgame/">bit-turtle/nesgame</a> <br><br>
			If you have any feedback, or maybe an idea for the name, please fill out the <a href="https://forms.gle/CUqMrwXrPM8BjWDK8">feedback form</a>
		</p>
	</div>
</body></html>
